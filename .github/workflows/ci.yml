name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build (sem testes)
        run: mvn -B clean package -DskipTests

      - name: Rodar testes
        run: mvn test

      - name: Verificar se app sobe (opcional)
        run: |
          java -jar target/*.jar &
          sleep 10
