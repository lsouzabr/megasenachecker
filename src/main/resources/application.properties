#spring.application.name=megasena-checker
server.port=8080

spring.docker.compose.enabled=false

# Import do .env caso queira (Spring Boot 2.4+) - requer nomear como .env.properties ou plugin, mas explicitando as vars fica assim
spring.config.import=optional:file:.env[.properties]

spring.cloud.aws.dynamodb.table-name=${DYNAMODB_TABLE_NAME:megasena}

spring.mail.host=email-smtp.us-east-1.amazonaws.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.email.sender=${EMAIL_SENDER}
app.email.recipient=${EMAIL_RECIPIENT}
app.meuJogo=${MEU_JOGO}
